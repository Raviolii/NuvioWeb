<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  
  <script>
    (function configureTizenLaunch() {
      var root = typeof globalThis !== "undefined" ? globalThis : window;
      var search = String((window.location && window.location.search) || "").toLowerCase();
      var userAgent = String((window.navigator && window.navigator.userAgent) || "").toLowerCase();
      var webapis = root.webapis || {};
      var isTizenLaunch = Boolean(
        root.__NUVIO_PLATFORM__ === "tizen"
        || root.tizen
        || root.avplay
        || webapis.avplay
        || webapis.avPlay
        || webapis.productinfo
        || search.indexOf("wrapper=tizen") !== -1
        || userAgent.indexOf("tizen") !== -1
      );

      if (!isTizenLaunch) {
        return;
      }

      root.__NUVIO_PLATFORM__ = "tizen";
      var viewport = document.querySelector("meta[name='viewport']");
      if (!viewport) {
        viewport = document.createElement("meta");
        viewport.name = "viewport";
        document.head.appendChild(viewport);
      }
      viewport.setAttribute("content", "width=1920, height=1080, initial-scale=1.0, maximum-scale=1.0, user-scalable=no");
    }());
  </script>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Nuvio TV</title>
  
  <link rel="stylesheet" href="css/base.css?v=20260509s" />
  <link rel="stylesheet" href="css/layout.css?v=20260509s" />
  <link rel="stylesheet" href="css/components.css?v=20260531supporters2" />
  <link rel="stylesheet" href="css/themes.css?v=20260509s" />

  <style>
    @media screen and (max-width: 1024px) {
        
        /* 1. Prevent standard layouts from locking heights on handheld viewports */
        html, body, #app, .app-root, .main-container {
            width: 100% !important;
            height: auto !important;
            min-height: 100vh !important;
            overflow-y: auto !important;
            overflow-x: hidden !important;
            -webkit-overflow-scrolling: touch !important;
            background-color: #0c0c0c !important;
        }

        /* Pad content inside the mobile display boundaries safely */
        body {
            padding-top: env(safe-area-inset-top) !important;
            padding-bottom: calc(env(safe-area-inset-bottom) + 80px) !important;
            padding-left: env(safe-area-inset-left) !important;
            padding-right: env(safe-area-inset-right) !important;
            position: relative !important;
        }

        /* 2. Rescale rows/grids to use vertical wrapping templates instead of horizontal scrolling */
        .home-row, .media-row, .grid-container, .catalog-grid {
            display: flex !important;
            flex-wrap: wrap !important;
            flex-direction: row !important;
            width: 100% !important;
            gap: 12px !important;
            padding: 10px !important;
            overflow: visible !important;
            white-space: normal !important;
        }

        /* 3. Re-constrain items to portrait aspect ratios */
        .poster, .card, .media-item, .item-container {
            width: calc(50% - 6px) !important; /* Forces an exact 2-column distribution */
            max-width: calc(50% - 6px) !important;
            height: auto !important;
            aspect-ratio: 2 / 3 !important;
            flex-grow: 0 !important;
            flex-shrink: 0 !important;
        }

        /* Ensure images fill up their parent containers completely */
        .poster img, .card img, .media-item img {
            width: 100% !important;
            height: 100% !important;
            object-fit: cover !important;
        }

        /* 4. Shift stationary structural TV sidebars into an interactive mobile bottom bar */
        .sidebar, .navigation-menu, .nav-panel, .left-menu {
            position: fixed !important;
            bottom: 0 !important;
            top: auto !important;
            left: 0 !important;
            right: 0 !important;
            width: 100% !important;
            height: 65px !important;
            max-width: 100% !important;
            flex-direction: row !important;
            justify-content: space-around !important;
            align-items: center !important;
            background-color: #121212 !important;
            border-top: 1px solid #222222 !important;
            padding-bottom: env(safe-area-inset-bottom) !important;
            z-index: 999999 !important;
        }

        /* Format individual bottom nav links */
        .sidebar a, .navigation-menu a, .nav-panel li {
            display: flex !important;
            flex-direction: column !important;
            align-items: center !important;
            justify-content: center !important;
            font-size: 11px !important;
            padding: 5px !important;
        }

        /* 5. Handle typography scaling */
        h1, .main-title { font-size: 1.4rem !important; }
        h2, .section-title { font-size: 1.15rem !important; }
        p, .meta-text { font-size: 0.85rem !important; }
    }
  </style>
</head>
<body>
  <script src="nuvio.env.js"></script>
  <script src="assets/libs/qrcode-generator.js"></script>
  <script src="app.bundle.js?v=20260531supporters2"></script>
 </body>
 </html>
