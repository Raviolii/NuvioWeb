<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Nuvio TV Mobile</title>
  
  <link rel="stylesheet" href="css/base.css?v=20260509s" />
  <link rel="stylesheet" href="css/layout.css?v=20260509s" />
  <link rel="stylesheet" href="css/components.css?v=20260531supporters2" />
  <link rel="stylesheet" href="css/themes.css?v=20260509s" />

  <style>
    /* --- GLOBAL MOBILITY MATRIX --- */
    html, body, #app, [id*="app"], [class*="app"] {
        width: 100vw !important;
        max-width: 100vw !important;
        height: 100vh !important;
        max-height: 100vh !important;
        overflow: hidden !important;
        position: fixed !important;
        top: 0 !important;
        left: 0 !important;
        margin: 0 !important;
        padding: 0 !important;
        background-color: #070707 !important;
    }

    /* --- THE FIX: FORCED VERTICAL CONTENT SCROLLING AREA --- */
    /* Selects the deep wrapper holding the movie content */
    body div:not([class*="sidebar"]):not([class*="menu"]) {
        overflow-y: auto !important;
        overflow-x: hidden !important;
        -webkit-overflow-scrolling: touch !important;
    }

    /* Target the main dashboard body layout views */
    div[class*="content"], div[class*="main"], div[class*="body"], main, .main-layout {
        width: 100vw !important;
        max-width: 100vw !important;
        height: calc(100vh - 60px) !important; /* Cuts off exactly above the new bottom bar */
        position: absolute !important;
        top: 0 !important;
        left: 0 !important;
        overflow-y: auto !important;
        overflow-x: hidden !important;
        padding: 20px 15px 100px 15px !important;
        box-sizing: border-box !important;
    }

    /* --- POSTER SHELF AND MATRIX GRID RESPONSIVENESS --- */
    /* Stop items from sliding off right screen edge */
    div[class*="row"], div[class*="shelf"], div[class*="grid"], div[class*="list"], .media-row {
        display: flex !important;
        flex-direction: row !important;
        flex-wrap: wrap !important; /* Wrap cards down vertically */
        width: 100% !important;
        max-width: 100% !important;
        gap: 10px !important;
        overflow-x: hidden !important;
        overflow-y: visible !important;
        white-space: normal !important;
        padding: 5px 0 !important;
    }

    /* Scale cards to dual columns on mobile views */
    div[class*="card"], div[class*="item"], div[class*="poster"], .poster, .card {
        width: calc(50% - 5px) !important;
        max-width: calc(50% - 5px) !important;
        flex: 0 0 calc(50% - 5px) !important;
        height: auto !important;
        aspect-ratio: 2 / 3 !important;
        box-sizing: border-box !important;
    }

    /* --- SIDEBAR FLIP MECHANICS: SNAP TO BOTTOM & SHRKINK --- */
    /* Grabs the TV sidebar panel, crushes its width, flips it down, and downsizes elements */
    div[class*="sidebar"], div[class*="menu"], nav, .sidebar {
        position: fixed !important;
        bottom: 0 !important;
        top: auto !important;
        left: 0 !important;
        right: 0 !important;
        width: 100vw !important;
        max-width: 100vw !important;
        min-width: 100vw !important;
        height: 60px !important; /* Super slim mobile footprint */
        max-height: 60px !important;
        flex-direction: row !important; /* Stack horizontally instead of vertically */
        justify-content: space-around !important;
        align-items: center !important;
        background-color: #0f0f0f !important;
        border-top: 1px solid #1f1f1f !important;
        padding: 0 !important;
        padding-bottom: env(safe-area-inset-bottom) !important;
        margin: 0 !important;
        z-index: 9999999 !important;
        transform: none !important;
    }

    /* Force the navigation children/icons to be significantly smaller */
    div[class*="sidebar"] *, div[class*="menu"] *, .sidebar * {
        width: auto !important;
        height: auto !important;
        max-height: 32px !important; /* Keeps icons tiny */
        font-size: 16px !important; /* Shrinks fonts/font-awesome glyphs */
        margin: 0 !important;
        padding: 4px !important;
        flex-direction: row !important;
    }

    /* --- TYPOGRAPHY CORRECTIONS --- */
    h1, h2, h3, div[class*="title"], div[class*="header"] {
        font-size: 1.2rem !important;
        max-width: 100% !important;
        padding-left: 0 !important;
    }
    
    div[class*="metadata"], p, span {
        font-size: 0.8rem !important;
    }
  </style>
</head>
<body>
  <script src="nuvio.env.js"></script>
  <script src="assets/libs/qrcode-generator.js"></script>
  <script src="app.bundle.js?v=20260531supporters2"></script>
 </body>
 </html>
