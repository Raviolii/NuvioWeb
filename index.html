<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <title>Nuvio Web (Mobile Optimized)</title>

    <link rel="icon" type="image/png" href="icon.png">

    <style>
        @media screen and (max-width: 1024px) {
            
            /* Enable fluid mobile gesture physics and smooth vertical scrolling */
            html, body {
                -webkit-text-size-adjust: 100% !important;
                overflow-y: auto !important;
                -webkit-overflow-scrolling: touch !important;
                background-color: #070707 !important;
                margin: 0 !important;
                padding: 0 !important;
            }

            /* Automatically pads content away from the iPhone notch, dynamic island, and swipe home bar */
            body {
                padding-top: env(safe-area-inset-top) !important;
                padding-bottom: calc(env(safe-area-inset-bottom) + 75px) !important; /* Leaves room above bottom bar */
                padding-left: env(safe-area-inset-left) !important;
                padding-right: env(safe-area-inset-right) !important;
            }

            /* Forces wide horizontal TV list categories into a 2-column portrait vertical mobile layout */
            .media-row, .catalog-grid, .grid, [class*="grid"], [class*="row"], [class*="list"] {
                display: grid !important;
                grid-template-columns: repeat(2, 1fr) !important; 
                gap: 12px !important;
                padding: 14px !important;
                overflow-x: hidden !important;
                overflow-y: visible !important;
                white-space: normal !important;
            }

            /* Rescales landscape TV banners into standard vertical streaming posters (2:3 aspect ratio) */
            .poster-card, .card, .item, [class*="card"], [class*="poster"], [class*="thumb"] {
                width: 100% !important;
                height: auto !important;
                aspect-ratio: 2 / 3 !important;
                display: block !important;
            }

            /* Takes the stationary left side menu/sidebar on TVs and maps it to an iOS bottom navigation bar */
            .sidebar, .nav-menu, .navigation, [class*="nav"], [class*="sidebar"], [class*="menu"] {
                position: fixed !important;
                bottom: 0 !important;
                top: auto !important;
                left: 0 !important;
                width: 100% !important;
                height: 70px !important;
                flex-direction: row !important;
                justify-content: space-around !important;
                align-items: center !important;
                background-color: #0d0d0d !important;
                border-top: 1px solid #1a1a1a !important;
                padding-bottom: env(safe-area-inset-bottom) !important;
                z-index: 99999 !important;
                box-shadow: 0 -4px 20px rgba(0, 0, 0, 0.8) !important;
            }

            /* Keeps navigation element layout text or icons centered sideways inside the new bottom bar */
            .sidebar a, .nav-menu li, [class*="nav"] > *, [class*="sidebar"] > * {
                flex-direction: column !important;
                justify-content: center !important;
                align-items: center !important;
                padding: 5px !important;
                margin: 0 !important;
            }

            /* Drastically tones down font scale designed to be read across a room so it stays sharp on mobile */
            h1, .title, [class*="title"] { font-size: 1.35rem !important; font-weight: 700 !important; }
            h2, .subtitle, [class*="subtitle"] { font-size: 1.1rem !important; }
            p, .description, [class*="desc"], [class*="text"] { font-size: 0.85rem !important; line-height: 1.4 !important; }

            /* Fix button tapping surface areas for finger targets instead of TV remote selections */
            button, .btn, [class*="button"], [class*="btn"] {
                min-height: 44px !important;
                padding: 8px 16px !important;
                font-size: 0.9rem !important;
            }
        }
    </style>
</head>
<body>

    <div id="app"></div>

    <script type="module" src="/src/main.js"></script>
</body>
</html>
