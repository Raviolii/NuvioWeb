<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  
  <script>
    (function configureTizenLaunch() {
      var root = typeof globalThis !== "undefined" ? globalThis : window;
      var search = String((window.location && window.location.search) || "").toLowerCase();
      var userAgent = String((window.navigator && window.navigator.userAgent) || "").toLowerCase();
      var webapis = root.webapis || {};
      var isTizenLaunch = Boolean(
        root.__NUVIO_PLATFORM__ === "tizen"
        || root.tizen
        || root.avplay
        || webapis.avplay
        || webapis.avPlay
        || webapis.productinfo
        || search.indexOf("wrapper=tizen") !== -1
        || userAgent.indexOf("tizen") !== -1
      );

      if (!isTizenLaunch) {
        return;
      }

      root.__NUVIO_PLATFORM__ = "tizen";
      var viewport = document.querySelector("meta[name='viewport']");
      if (!viewport) {
        viewport = document.createElement("meta");
        viewport.name = "viewport";
        document.head.appendChild(viewport);
      }
      viewport.setAttribute("content", "width=1920, height=1080, initial-scale=1.0, maximum-scale=1.0, user-scalable=no");
    }());
  </script>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Nuvio TV</title>
  
  <link rel="stylesheet" href="css/base.css?v=20260509s" />
  <link rel="stylesheet" href="css/layout.css?v=20260509s" />
  <link rel="stylesheet" href="css/components.css?v=20260531supporters2" />
  <link rel="stylesheet" href="css/themes.css?v=20260509s" />

  <style>
    @media screen and (max-width: 1024px) {
        
        /* Smooth vertical scrolling and force mobile layout physics */
        html, body {
            -webkit-text-size-adjust: 100% !important;
            overflow-y: auto !important;
            -webkit-overflow-scrolling: touch !important;
            background-color: #070707 !important;
            margin: 0 !important;
            padding: 0 !important;
        }

        /* Pad content dynamically away from the iPhone notch and bottom swipe home bar */
        body {
            padding-top: env(safe-area-inset-top) !important;
            padding-bottom: calc(env(safe-area-inset-bottom) + 80px) !important; /* Leave gap above the bottom nav */
            padding-left: env(safe-area-inset-left) !important;
            padding-right: env(safe-area-inset-right) !important;
        }

        /* Forces wide horizontal TV lists/grids into a clean 2-column portrait vertical mobile feed */
        .media-row, .catalog-grid, .grid, [class*="grid"], [class*="row"], [class*="list"] {
            display: grid !important;
            grid-template-columns: repeat(2, 1fr) !important; 
            gap: 12px !important;
            padding: 14px !important;
            overflow-x: hidden !important;
            overflow-y: visible !important;
            white-space: normal !important;
        }

        /* Forces landscape TV banners into standard vertical streaming posters (2:3 aspect ratio) */
        .poster-card, .card, .item, [class*="card"], [class*="poster"], [class*="thumb"] {
            width: 100% !important;
            height: auto !important;
            aspect-ratio: 2 / 3 !important;
            display: block !important;
        }

        /* Converts the stationary left-hand TV sidebar into a modern iOS bottom navigation bar */
        .sidebar, .nav-menu, .navigation, [class*="nav"], [class*="sidebar"], [class*="menu"] {
            position: fixed !important;
            bottom: 0 !important;
            top: auto !important;
            left: 0 !important;
            width: 100% !important;
            height: 70px !important;
            flex-direction: row !important;
            justify-content: space-around !important;
            align-items: center !important;
            background-color: #0d0d0d !important;
            border-top: 1px solid #1a1a1a !important;
            padding-bottom: env(safe-area-inset-bottom) !important;
            z-index: 99999 !important;
            box-shadow: 0 -4px 20px rgba(0, 0, 0, 0.8) !important;
        }

        /* Centers navigation links/icons horizontally inside our new bottom menu bar */
        .sidebar a, .nav-menu li, [class*="nav"] > *, [class*="sidebar"] > * {
            flex-direction: column !important;
            justify-content: center !important;
            align-items: center !important;
            padding: 5px !important;
            margin: 0 !important;
        }

        /* Downscales massive television typography to fit neatly on mobile screens */
        h1, .title, [class*="title"] { font-size: 1.35rem !important; font-weight: 700 !important; }
        h2, .subtitle, [class*="subtitle"] { font-size: 1.1rem !important; }
        p, .description, [class*="desc"], [class*="text"] { font-size: 0.85rem !important; line-height: 1.4 !important; }

        /* Expands interactive button boundaries to comfortably accept finger taps */
        button, .btn, [class*="button"], [class*="btn"] {
            min-height: 44px !important;
            padding: 8px 16px !important;
            font-size: 0.9rem !important;
        }
    }
  </style>
</head>
<body>
  <script src="nuvio.env.js"></script>
  <script src="assets/libs/qrcode-generator.js"></script>
  <script src="app.bundle.js?v=20260531supporters2"></script>
 </body>
 </html>
