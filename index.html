<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  
  <script>
    (function configureTizenLaunch() {
      var root = typeof globalThis !== "undefined" ? globalThis : window;
      var search = String((window.location && window.location.search) || "").toLowerCase();
      var userAgent = String((window.navigator && window.navigator.userAgent) || "").toLowerCase();
      var webapis = root.webapis || {};
      var isTizenLaunch = Boolean(
        root.__NUVIO_PLATFORM__ === "tizen"
        || root.tizen
        || root.avplay
        || webapis.avplay
        || webapis.avPlay
        || webapis.productinfo
        || search.indexOf("wrapper=tizen") !== -1
        || userAgent.indexOf("tizen") !== -1
      );

      if (!isTizenLaunch) {
        return;
      }

      root.__NUVIO_PLATFORM__ = "tizen";
      var viewport = document.querySelector("meta[name='viewport']");
      if (!viewport) {
        viewport = document.createElement("meta");
        viewport.name = "viewport";
        document.head.appendChild(viewport);
      }
      viewport.setAttribute("content", "width=1920, height=1080, initial-scale=1.0, maximum-scale=1.0, user-scalable=no");
    }());
  </script>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Nuvio TV</title>
  
  <link rel="stylesheet" href="css/base.css?v=20260509s" />
  <link rel="stylesheet" href="css/layout.css?v=20260509s" />
  <link rel="stylesheet" href="css/components.css?v=20260531supporters2" />
  <link rel="stylesheet" href="css/themes.css?v=20260509s" />

  <style>
    @media screen and (max-width: 1024px) {
        
        /* Force the underlying engine to use the phone screen boundaries */
        html, body, #app {
            width: 100vw !important;
            max-width: 100vw !important;
            height: 100vh !important;
            overflow: hidden !important;
            background-color: #070707 !important;
            margin: 0 !important;
            padding: 0 !important;
        }

        /* Re-organize the app's main page container layout */
        div[class*="container"], div[class*="root"], main, .app-layout {
            display: flex !important;
            flex-direction: column !important; /* Stack menu and content vertically */
            width: 100% !important;
            height: 100% !important;
            overflow: hidden !important;
        }

        /* Fix the main content scrolling body area */
        div[class*="content"], div[class*="body"], div[class*="main"] {
            width: 100% !important;
            flex: 1 !important;
            overflow-y: auto !important;
            overflow-x: hidden !important;
            -webkit-overflow-scrolling: touch !important;
            padding: 15px 15px 90px 15px !important; /* Room at bottom for navigation bar */
            box-sizing: border-box !important;
        }

        /* Fix layout rows that are hiding off the right side of the screen */
        div[class*="row"], div[class*="shelf"], div[class*="grid"], .media-row {
            display: flex !important;
            flex-wrap: wrap !important; /* Force items to wrap underneath instead of scrolling infinitely right */
            width: 100% !important;
            max-width: 100% !important;
            gap: 12px !important;
            margin: 10px 0 !important;
            padding: 0 !important;
            overflow: visible !important;
        }

        /* Force movie posters to split perfectly into a 2-column mobile configuration */
        div[class*="card"], div[class*="item"], div[class*="poster"], .poster, .card {
            width: calc(50% - 6px) !important;
            max-width: calc(50% - 6px) !important;
            flex: 0 0 calc(50% - 6px) !important;
            height: auto !important;
            aspect-ratio: 2 / 3 !important;
            box-sizing: border-box !important;
        }

        /* Forces images inside the items to stay perfectly bounded */
        div[class*="card"] img, div[class*="poster"] img, img {
            width: 100% !important;
            height: 100% !important;
            object-fit: cover !important;
        }

        /* TARGETS THE LEFT SIDEBAR AND FLIPS IT TO THE BOTTOM */
        div[class*="sidebar"], div[class*="menu"], nav, .sidebar {
            position: fixed !important;
            bottom: 0 !important;
            top: auto !important;
            left: 0 !important;
            right: 0 !important;
            width: 100% !important;
            height: 70px !important;
            max-width: 100% !important;
            min-width: 100% !important;
            flex-direction: row !important; /* Make items display horizontally */
            justify-content: space-around !important;
            align-items: center !important;
            background-color: #121212 !important;
            border-top: 1px solid #222222 !important;
            padding-bottom: env(safe-area-inset-bottom) !important;
            z-index: 999999 !important;
            transform: none !important;
        }

        /* Adjust sizing of individual navigation menu icons/buttons */
        div[class*="sidebar"] a, div[class*="menu"] button, div[class*="sidebar"] i, .sidebar * {
            font-size: 20px !important;
            margin: 0 !important;
            padding: 10px !important;
            width: auto !important;
            height: auto !important;
        }

        /* Shrink massive text fields designed for TV displays */
        h1, h2, h3, div[class*="title"], div[class*="header"] {
            font-size: 1.3rem !important;
            line-height: 1.3 !important;
            max-width: 100% !important;
        }
        
        span[class*="duration"], div[class*="metadata"], p {
            font-size: 0.85rem !important;
        }
    }
  </style>
</head>
<body>
  <script src="nuvio.env.js"></script>
  <script src="assets/libs/qrcode-generator.js"></script>
  <script src="app.bundle.js?v=20260531supporters2"></script>
 </body>
 </html>
