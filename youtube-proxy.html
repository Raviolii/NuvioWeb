<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
html,body{margin:0;height:100%}
#yt{width:100%;height:100%}
</style>
</head>

<body>

<div id="yt"></div>

<script src="https://www.youtube.com/iframe_api"></script>
<script>
const v = new URLSearchParams(location.search).get("v") || "qBg39HCJiTU";

function onYouTubeIframeAPIReady() {
  new YT.Player("yt", {
    videoId: v,
    playerVars: {
      autoplay: 1
    }
  });
}
</script>

</body>
</html>
